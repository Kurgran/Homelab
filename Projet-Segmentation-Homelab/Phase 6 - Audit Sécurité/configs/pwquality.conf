# /etc/security/pwquality.conf
# CIS Debian Linux 12 Benchmark — Politique de complexité des mots de passe
# Nécessite : apt install libpam-pwquality -y
# Activer dans /etc/pam.d/common-password (avant la ligne pam_unix.so) :
#   password    requisite    pam_pwquality.so retry=3

# Longueur minimale
minlen = 14

# Nombre minimum de classes de caractères (majuscules, minuscules, chiffres, spéciaux)
minclass = 4

# Exiger au moins 1 chiffre
dcredit = -1

# Exiger au moins 1 majuscule
ucredit = -1

# Exiger au moins 1 caractère spécial
ocredit = -1

# Exiger au moins 1 minuscule
lcredit = -1

# Interdire plus de 3 caractères identiques consécutifs
maxrepeat = 3
