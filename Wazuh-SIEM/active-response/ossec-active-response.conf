<?xml version="1.0" encoding="UTF-8"?>
<!--
  ossec-active-response.conf
  Blocs à ajouter dans /var/ossec/etc/ossec.conf sur le Wazuh Manager.
  Placer ces blocs à l'intérieur de la balise <ossec_config> existante.

  Après modification : systemctl restart wazuh-manager
-->

<!-- =========================================================================
     BLOC 1 — Déclaration du script Active Response
     Indique à Wazuh le nom du script, son exécutable, et si le timeout
     (débloc automatique) est autorisé.
     ========================================================================= -->
<command>
    <name>pfsense-block</name>
    <!-- Nom du fichier dans /var/ossec/active-response/bin/ -->
    <executable>pfsense-block.sh</executable>
    <!-- yes = Wazuh peut relancer le script avec l'action "delete" après timeout -->
    <timeout_allowed>yes</timeout_allowed>
</command>


<!-- =========================================================================
     BLOC 2 — Liaison règles -> script (Active Response)
     Définit quelles règles déclenchent le script, depuis quelle machine,
     et le délai avant débloc automatique.
     ========================================================================= -->
<active-response>
    <!-- Nom du <command> défini ci-dessus -->
    <command>pfsense-block</command>

    <!--
      location=local : le script s'exécute sur le Manager lui-même.
      C'est le Manager qui possède la clé SSH vers pfSense, pas les agents.
      Ne pas utiliser "defined-agent" ou "all" pour ce cas d'usage.
    -->
    <location>local</location>

    <!--
      Règles déclenchantes (level >= 10 dans notre config) :
        100023 — Synology brute force SSH (T1110.001)
        100024 — Synology énumération utilisateurs (T1087)
        100041 — Suricata Priority 1 critique (T1190)
        100043 — Suricata hôte compromis connu ET (T1071 + T1059)
    -->
    <rules_id>100023,100024,100041,100043</rules_id>

    <!--
      Timeout en secondes avant débloc automatique.
      Après 600s, Wazuh relance pfsense-block.sh avec l'action "delete".
      L'IP est retirée de la table pfctl wazuh_blocked.
      Filet de sécurité contre les faux positifs.
    -->
    <timeout>600</timeout>
</active-response>
