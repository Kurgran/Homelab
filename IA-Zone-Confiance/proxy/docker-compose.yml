services:
  litellm:
    # V1.1 : on ne tire plus l'image officielle telle quelle (`image:`), on la
    # CONSTRUIT à partir du Dockerfile local (image officielle + detect-secrets).
    build:
      context: .              # dossier de build = ./proxy (où vit le Dockerfile)
      dockerfile: Dockerfile
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      # Config (déjà là en V1.0), montée en lecture seule.
      - ./litellm-config.yaml:/app/config.yaml:ro
      # V1.1 : le garde-fou monté dans /app → LiteLLM peut l'importer comme
      # module `dlp_guardrail`. En volume (pas COPY) = on édite le .py et on
      # relance le conteneur sans reconstruire l'image. :ro = jamais modifié
      # par le conteneur.
      - ./dlp_guardrail.py:/app/dlp_guardrail.py:ro
    command: ["--config", "/app/config.yaml", "--detailed_debug"]
    # V2.0 : injecte les variables du fichier .env (dont MISTRAL_API_KEY) DANS le
    # conteneur, où LiteLLM les lit via `os.environ/...`. Le chemin est relatif à
    # ce docker-compose.yml → ./proxy/.env, qui est gitignored (jamais dans Git).
    env_file:
      - .env
    environment:
      # Contournement issue #9602 : LiteLLM interroge OLLAMA_API_BASE/api/show
      # pour les infos du modèle, parfois en ignorant l'api_base du fichier.
      - OLLAMA_API_BASE=http://ollama:11434
    restart: unless-stopped
    networks:
      - ai-net

networks:
  # On NE crée PAS un nouveau réseau : on rejoint celui d'Ollama (déjà existant,
  # créé par la stack IA-Local / ai-sovereign-stack).
  ai-net:
    external: true
    name: ai-sovereign-stack_default
