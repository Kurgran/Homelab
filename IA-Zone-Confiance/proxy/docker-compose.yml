services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--detailed_debug"]
    environment:
      # Contournement issue #9602 : LiteLLM interroge OLLAMA_API_BASE/api/show
      # pour les infos du modèle, parfois en ignorant l'api_base du fichier.
      - OLLAMA_API_BASE=http://ollama:11434
    restart: unless-stopped
    networks:
      - ai-net

networks:
  # On NE crée PAS un nouveau réseau : on rejoint celui d'Ollama (déjà existant,
  # créé par la stack IA-Local / ai-sovereign-stack).
  ai-net:
    external: true
    name: ai-sovereign-stack_default
