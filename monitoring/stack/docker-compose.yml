version: '3.8'

# ═══════════════════════════════════════════════════
#  RÉSEAU
# ═══════════════════════════════════════════════════
networks:
  monitoring:
    driver: bridge

# ═══════════════════════════════════════════════════
#  VOLUMES PERSISTANTS
# ═══════════════════════════════════════════════════
volumes:
  prometheus_data:
  grafana_data:

# ═══════════════════════════════════════════════════
#  SERVICES
# ═══════════════════════════════════════════════════
services:

  # ─────────────────────────────────────────────────
  #  MÉTRIQUES
  # ─────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123   # ⚠️ À changer en production
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring

  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    ports:
      - "9116:9116"
    volumes:
      - ./snmp/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    networks:
      - monitoring

  # ─────────────────────────────────────────────────
  #  LOGS — Ajout janvier 2026
  # ─────────────────────────────────────────────────

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro                              # Logs système du Mac (lecture seule)
      - ./loki/promtail-config.yaml:/etc/promtail/config.yml
    ports:
      - "1514:1514/udp"   # Réception Syslog UDP depuis pfSense / NAS
      - "9080:9080"        # Interface de diagnostic Promtail
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring